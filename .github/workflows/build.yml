name: Build Debug APK
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle 9.3.1
        run: |
          wget -nv -O /tmp/gradle.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-9.3.1/bin" >> $GITHUB_PATH
      - name: Setup Android SDK + CI config
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "sdk.dir=$SDK" > local.properties
          SDKMANAGER=$(find "$SDK/cmdline-tools" -name sdkmanager -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
            # AGP 9.1.1 requires Build Tools 36.0.0 minimum
            "$SDKMANAGER" "platforms;android-35" "build-tools;36.0.0" 2>&1 | tail -5 || true
          fi
          printf 'org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8\norg.gradle.parallel=false\norg.gradle.caching=false\norg.gradle.configuration-cache=false\nandroid.nonTransitiveRClass=true\nkotlin.code.style=official\nkotlin.compiler.execution.strategy=in-process\n' > gradle.properties
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
