name: Build Debug APK
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
      - name: Install Android SDK 36
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" 2>/dev/null || \
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.1"
      - name: Generate Gradle wrapper JAR
        run: gradle wrapper --gradle-version 8.14.1
      - name: Build Debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace
      - name: Update .build-outputs
        run: mkdir -p .build-outputs && cp app/build/outputs/apk/debug/app-debug.apk .build-outputs/app-debug.apk
      - name: Commit build artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .build-outputs/app-debug.apk gradle/wrapper/gradle-wrapper.jar || true
          git diff --staged --quiet || git commit -m "ci: update APK and wrapper jar [skip ci]"
          git push || true
