name: Build Debug APK
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle 9.4.1
        run: |
          wget -nv -O /tmp/gradle.zip https://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          unzip -q /tmp/gradle.zip -d /opt
          ls /opt/gradle-9.4.1/bin/gradle && echo "Gradle binary OK"
          echo "/opt/gradle-9.4.1/bin" >> $GITHUB_PATH
      - name: Setup Android SDK
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "SDK root: $SDK"
          echo "Installed platforms:"
          ls "$SDK/platforms/" 2>/dev/null || echo "  (none)"
          SDKMANAGER=$(find "$SDK/cmdline-tools" -name sdkmanager -type f 2>/dev/null | sort -V | tail -1)
          echo "sdkmanager: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5 || true
          fi
          echo "After install:"
          ls "$SDK/platforms/" 2>/dev/null || echo "  (still none)"
          echo "sdk.dir=$SDK" > local.properties
          echo "Created local.properties: $(cat local.properties)"
      - name: Build Debug APK
        run: gradle assembleDebug --no-configuration-cache --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
